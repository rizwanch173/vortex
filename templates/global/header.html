{% load static %}
 <header class="header-style2">
        <div class="navbar-default">
          <!-- start top search -->
          <div class="top-search bg-primary">
            <div class="container-fluid px-lg-1-6 px-xl-2-5 px-xxl-2-9">
              <form
                class="search-form"
                action="{% url 'search' %}"
                method="GET"
                accept-charset="utf-8"
              >
                <div class="input-group">
                  <span class="input-group-addon cursor-pointer">
                    <button
                      class="search-form_submit fas fa-search text-white"
                      type="submit"
                    ></button>
                  </span>
                  <input
                    type="text"
                    class="search-form_input form-control"
                    name="s"
                    autocomplete="off"
                    placeholder="Type & hit enter..."
                  />
                  <span class="input-group-addon close-search mt-1"
                    ><i class="fas fa-times"></i
                  ></span>
                </div>
              </form>
            </div>
          </div>
          <!-- end top search -->

          <div class="container-fluid px-lg-1-6 px-xl-2-5 px-xxl-2-9">
            <div class="row align-items-center">
              <div class="col-12 col-lg-12">
                <div class="menu_area alt-font">
                  <nav class="navbar navbar-expand-lg navbar-light p-0">
                    <div class="navbar-header navbar-header-custom">
                      <!-- start logo -->
                      <a href="{% url 'home' %}" class="navbar-brand logodefault"
                        ><img
                          id="logo"
                          src="{% static 'img/logos/logo.png' %}"
                          data-top-src="{% static 'img/logos/logo.png' %}"
                          data-scrolled-src="{% static 'img/logos/logo.png' %}"
                          decoding="async"
                          alt="Vortex Ease"
                      /></a>
                      <!-- end logo -->
                    </div>

                    <div class="navbar-toggler bg-primary"></div>

                    <!-- start menu area -->
                    <ul
                      class="navbar-nav ms-auto"
                      id="nav"
                      style="display: none"
                    >
                      <li><a href="{% url 'home' %}">Home</a></li>
                      <li class="dropdown">
                        <a href="#">Services</a>
                        <ul>
                          <li><a href="{% url 'services' %}">Visit Visa</a></li>
                          <li><a href="{% url 'study_visa_hub' %}">Study Visa</a></li>
                        </ul>
                      </li>
                      <!-- <li>
                        <a href="coaching.html">Coaching</a>
                      </li> -->

                      <li><a href="{% url 'blogs' %}">Blogs</a></li>
                      <li><a href="{% url 'faq' %}">FAQ</a></li>
                      <li><a href="{% url 'contact' %}">Contact</a></li>
                    </ul>
                    <div
                      class="attr-nav align-items-xl-center ms-xl-auto main-font"
                    >
                      <ul>
                        <li class="search">
                          <a href="#!"><i class="fas fa-search"></i></a>
                        </li>
                        <li class="d-none d-xl-inline-block">
                          <a href="{% url 'contact' %}" class="butn md"
                            ><span>Free Quote</span></a
                          >
                        </li>
                      </ul>
                    </div>
                    <!-- end attribute navigation -->
                  </nav>
                </div>
              </div>
            </div>
          </div>
        </div>
 </header>
